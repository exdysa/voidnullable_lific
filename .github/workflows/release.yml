name: Release

on:
  push:
    branches: [master]
    paths:
      - 'Cargo.toml'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version change
        id: check
        run: |
          CURRENT="$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')"
          PREVIOUS="$(git show HEAD~1:Cargo.toml 2>/dev/null | grep '^version' | head -1 | sed 's/.*"\(.*\)"/\1/' || echo '')"
          TAG="v${CURRENT}"

          echo "version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          if [ "$CURRENT" = "$PREVIOUS" ]; then
            echo "Version unchanged ($CURRENT), skipping release"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          elif git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping release"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version changed: ${PREVIOUS:-none} -> ${CURRENT}"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: detect
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Ensure web/dist exists for rust-embed
        run: mkdir -p web/dist
      - run: cargo test

  build:
    needs: [detect, test]
    if: needs.detect.outputs.changed == 'true'
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: lific-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: lific-linux-aarch64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            name: lific-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: lific-macos-aarch64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Build the embedded web UI before cargo build, so rust-embed
      # picks it up and bakes it into the release binary. Without this
      # the binary would ship without a web frontend.
      - uses: oven-sh/setup-bun@v2
      - name: Build web frontend
        run: |
          cd web
          bun install --frozen-lockfile
          bun run build
        shell: bash

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/lific ${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: [detect, build]
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.detect.outputs.tag }}" -m "Release ${{ needs.detect.outputs.tag }}"
          git push origin "${{ needs.detect.outputs.tag }}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd binaries
          sha256sum * > sha256sums.txt
          cat sha256sums.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.detect.outputs.tag }}" \
            --title "${{ needs.detect.outputs.tag }}" \
            --generate-notes \
            --latest \
            binaries/lific-linux-x86_64 \
            binaries/lific-linux-aarch64 \
            binaries/lific-macos-x86_64 \
            binaries/lific-macos-aarch64 \
            binaries/sha256sums.txt

      # Work around a gh draft-fallback bug (LIF-120): when `gh release
      # create` cannot confidently bind the just-pushed tag to the new
      # release at API-call time (a read-side propagation race), it
      # silently falls back to creating a *draft*. `--latest` is recorded
      # but is a no-op until the release is non-draft, so it sits drafted
      # forever (this stranded v1.2.0 through v1.3.1). Re-asserting the
      # published state here is idempotent and fixes it regardless of the
      # underlying gh quirk.
      - name: Publish release (force non-draft)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${{ needs.detect.outputs.tag }}" \
            --draft=false \
            --latest

  publish:
    needs: [detect, release]
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Build the web UI before publishing so the source tarball that
      # goes to crates.io contains a working dist/, not just a stub.
      # `cargo install lific` builds from source — without this, every
      # crates.io install would produce a UI-less binary.
      - uses: oven-sh/setup-bun@v2
      - name: Build web frontend
        run: |
          cd web
          bun install --frozen-lockfile
          bun run build
      - name: Publish to crates.io
        run: cargo publish --allow-dirty --no-verify || echo "Publish failed (version may already exist)"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
